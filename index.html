/* ===== ADMIN TOGGLE ULTRA PRO ===== */

.admin-toggle-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  color:#e2e8f0;
  font-weight:600;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}

/* Gradient glow nền */
.admin-toggle-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#2563eb,#3b82f6,#06b6d4);
  opacity:0;
  transition:0.4s;
  z-index:0;
}

.admin-toggle-btn span{
  position:relative;
  z-index:1;
}

/* Hover */
.admin-toggle-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(37,99,235,0.3);
}

/* Active state */
.admin-toggle-btn.active{
  color:white;
  border-color:transparent;
  box-shadow:0 15px 40px rgba(37,99,235,0.5);
}

.admin-toggle-btn.active::before{
  opacity:1;
}

/* Icon xoay */
.admin-icon{
  transition:transform 0.4s ease;
}

.admin-toggle-btn.active .admin-icon{
  transform:rotate(180deg);
}

/* Mũi tên dropdown */
.admin-arrow{
  margin-left:auto;
  transition:transform 0.4s ease;
}

.admin-toggle-btn.active .admin-arrow{
  transform:rotate(180deg);
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f5a0,#00d9ff);
  border-radius:10px;
  transition:width 0.3s ease;
}

.progress-percent{
  margin-top:8px;
  font-size:13px;
  opacity:0.7;
  text-align:right;
}

/* =====================================================
   🔬 ULTRA LAB MODE — SAMSUNG INTERNAL TOOL UI
   SAFE VERSION (NO BLACK TEXT)
===================================================== */

/* ===== LAB BACKGROUND ===== */
body{
  background:
    radial-gradient(circle at 85% 20%, rgba(37,99,235,.35), transparent 45%),
    radial-gradient(circle at 10% 90%, rgba(59,130,246,.25), transparent 50%),
    linear-gradient(160deg,#020617,#020617,#010409);

  color:#e5e7eb;
}

/* PCB GRID EFFECT */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 120px,
      rgba(56,189,248,.04) 121px,

    );
}

/* ===== RESULT CARD HARDWARE STYLE — PRO FIX ===== */
.result-card{

  /* nền glass thật */
  background:
    linear-gradient(145deg,
      rgba(11,18,32,.85),
      rgba(2,6,23,.75)
    );

  border-radius:22px;

  /* viền mềm hơn */
  border:1px solid rgba(255,255,255,.08);

  /* ⭐ DÒNG QUAN TRỌNG NHẤT */
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);

  /* depth thật */
  box-shadow:
    0 20px 60px rgba(0,0,0,.85),
    inset 0 0 25px rgba(255,255,255,.03);

  transition:.35s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}

.hardware-card{
  padding:18px 18px 16px;
}

.card-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;

}

.code-main{

  font-size:20px;

.card-subline{

.memory-strip{

.memory-pills{

/* CHIP SCAN LIGHT */
.result-card::after{

  position:absolute;

  width:130%;

  background:linear-gradient(
    120deg,

  );

}

/* ⭐ HOVER PRO FEEL */

  transform:translateY(-6px) scale(1.015);
  border-color:#38bdf8;

  box-shadow:
    0 35px 90px rgba(0,0,0,.95),

}

/* ===== CARD APPEAR ANIMATION ===== */
.result-card{
  animation:labCardIn .5s ease forwards;

}

@keyframes labCardIn{

    opacity:1;
  }
}


/* ===== BRAND COLOR ===== */
.brand{
  color:#9fb3c8;
  font-weight:500;
}

/* ===== SEARCH AI GLOW ===== */
.clean-check input:focus{
  border-color:#38bdf8;
  box-shadow:
    0 0 0 3px rgba(56,189,248,.25),
    0 0 30px rgba(56,189,248,.35);
}

/* FORCE LIGHT TEXT */
.result-card{
  color:#e2e8f0;
}
/* =====================================================
   ⭐ HỆ THỐNG HIỆU ỨNG LEVEL (A1 → A9)
   - Thay thế hoàn toàn hệ thống VIP cũ
   - Áp dụng màu + glow theo cấp độ
===================================================== */

/* ===== KHUNG BADGE CƠ BẢN ===== */

.vip-badge{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:6px 18px;
  border-radius:999px;

  font-size:13px;
  font-weight:700;
  letter-spacing:.7px;

  background:#050b18;
  border:1px solid #1e293b;

  transition:.3s ease;
}

/* ===== LỚP HIỆU ỨNG GLOW ===== */

.level-A1,
.level-A2,
.level-A3,
.level-A4,
.level-A5,
.level-A6,
.level-A7,
.level-A8,
.level-A9{
  position:relative;
  transition:.35s;
}

.level-A1::after,
.level-A2::after,
.level-A3::after,
.level-A4::after,
.level-A5::after,
.level-A6::after,
.level-A7::after,
.level-A8::after,
.level-A9::after{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:999px;
  filter:blur(12px);
  opacity:.35;
  z-index:-1;
}

/* ===== MÀU THEO LEVEL ===== */

.level-A1{
  color:#38bdf8;
  border-color:#38bdf8;
}
.level-A1::after{ background:#38bdf8; }

.level-A2,
.level-A3{
  color:#22c55e;
  border-color:#22c55e;
}
.level-A2::after,
.level-A3::after{ background:#22c55e; }

.level-A4{
  color:#facc15;
  border-color:#facc15;
}
.level-A4::after{ background:#facc15; }

.level-A5{
  color:#fb923c;
  border-color:#fb923c;
}
.level-A5::after{ background:#fb923c; }

.level-A6{
  color:#ef4444;
  border-color:#ef4444;
}
.level-A6::after{ background:#ef4444; }

.level-A7{
  color:#ec4899;
  border-color:#ec4899;
}
.level-A7::after{ background:#ec4899; }

.level-A8{
  color:#a855f7;
  border-color:#a855f7;
}
.level-A8::after{ background:#a855f7; }

.level-A9{
  color:#f43f5e;
  border-color:#f43f5e;
}
.level-A9::after{ background:#f43f5e; }

/* ===== HIỆU ỨNG KHI HOVER ===== */

.result-card:hover .level-A1::after,
.result-card:hover .level-A2::after,
.result-card:hover .level-A3::after,
.result-card:hover .level-A4::after,
.result-card:hover .level-A5::after,
.result-card:hover .level-A6::after,
.result-card:hover .level-A7::after,
.result-card:hover .level-A8::after,
.result-card:hover .level-A9::after{
  opacity:.7;
  filter:blur(18px);
}

/* ===== BADGE RAM ===== */

.ram-badge{
  padding:6px 16px;
  border-radius:999px;
  font-weight:600;
  font-size:14px;

  background:rgba(56,189,248,.12);
  color:#38bdf8;

  border:1px solid rgba(56,189,248,.35);

  box-shadow:
    inset 0 0 10px rgba(56,189,248,.15),
    0 0 15px rgba(56,189,248,.25);

  -webkit-backdrop-filter:blur(6px);
  backdrop-filter:blur(6px);
}

</style>


</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    <h1 class="login-title">TOOLVECHAI</h1>

    <!-- USER -->
    <div class="input-group">
      <span class="input-icon">👤</span>
      <input id="loginEmail" type="email" placeholder="USER">
    </div>

    <!-- PASS -->
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input id="loginPass" type="password" placeholder="PASS">
      <span class="toggle-pass" onclick="togglePassword()">👁</span>
    </div>

    <button onclick="secureLogin()">ĐĂNG NHẬP</button>
    <div id="loginError" class="login-error">Sai tài khoản!</div>
  </div>
</div>


<!-- MAIN -->
<div class="main-container">

  <h2 class="main-title">TOOLVECHAIV1</h2>

  <div class="sub-title">
    VIP • MMC • Model
  </div>

</div>


<!-- ===== ADMIN PANEL ===== -->
<div id="adminPanel" class="admin-panel">

  <div class="admin-top-bar"
  >

    <!-- BÊN TRÁI: ADMIN -->
    <button class="admin-toggle-btn" id="adminToggle" onclick="toggleAdmin()">
      <span class="admin-icon">⚙</span>
      <span class="admin-text">Admin</span>
    </button>

    <!-- Ở GIỮA: INPUT -->
    <div class="check-group clean-check admin-search-wrap">
      <input id="q"
             placeholder="Nhập mã hoặc model cần kiểm tra"
             autocomplete="off">
      <button class="check-btn" onclick="check()">🔍</button>
    </div>

    <!-- BÊN PHẢI: TẠO LINK -->
    <button class="create-link-btn small" onclick="createLink()">
      ＋ Tạo link
    </button>

  </div>

  <div id="adminContent">
    <div id="linkList"></div>
  </div>

</div>



<!-- ===== KẾT QUẢ ===== -->
<div id="out" class="result-shell"></div>

<script>

document.getElementById("adminPanel").style.display="none";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCEL7BDXvmNi2dp1VNpua7b2plpTiTOK3U",
  authDomain: "toolvechai.firebaseapp.com",
  projectId: "toolvechai"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db   = firebase.firestore();

firebase.auth.Auth.Persistence.NONE

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}


/* ================= DATABASE CACHE ================= */

let DB_CACHE=null;

async function loadDatabase(){

  if(DB_CACHE) return DB_CACHE;

  const snap = await db.collection("codes").get();

  const DATA = {};

  snap.forEach(doc => {

    const d = doc.data();

    if(!d || !d.code) return;

    const group = d.group || "UNKNOWN";

    if(!DATA[group]) DATA[group] = [];

    DATA[group].push({
      code: d.code,
      ram: d.ram ?? null,
      rom: d.rom ?? null,
      group: d.group ?? group
    });
  });

  DB_CACHE = DATA;

  console.log("✅ Database rebuilt from Firestore");

  return DATA;
}


/* ================= CHIP BRAND ================= */

function detectChip(code){

  code=(code||"").toUpperCase();

  if(/^K/.test(code))
    return {name:"Samsung"};

  if(/^H/.test(code))
    return {name:"SK hynix"};

  if(/^(MT|JZ|NW)/.test(code))
    return {name:"Micron"};

  return {name:"Unknown"};
}
function getColorByGroup(group){

  if(!group) return "#999";

  if(group.includes("A1")) return "#2b313d";
  if(group.includes("A2")) return "#3a404d";
  if(group.includes("A3")) return "#4a5160";
  if(group.includes("A4")) return "#636b78";
  if(group.includes("A5")) return "#7dd3fc";
  if(group.includes("A6")) return "#60a5fa";
  if(group.includes("A7")) return "#34d399";
  if(group.includes("A8")) return "#fbbf24";
  if(group.includes("A9")) return "#fb7185";
  if(group.includes("A10")) return "#facc15";

  return "#999";
}

/* ================= FIRESTORE ONLY ================= */

function buildHardware(data){

  if(!data){
    return {
      ram:null,
      rom:null,
      vip:null,
      storage:"Unknown"
    };
  }

  return {
    ram:data.ram ?? null,
    rom:data.rom ?? null,
    group:data.group ?? null,
    storage:data.storage ?? "Manual"
  };
}


/* ================= TÌM KIẾM ================= */

async function check(){

  const q=document.getElementById("q")
    .value.trim().toUpperCase();

  const out=document.getElementById("out");

  if(!q){
    out.innerHTML="";
    return;
  }

  out.innerHTML="🔍 Đang tìm...";

  try{

    const DATA=await loadDatabase();

    let html=`<div class="result-grid">`;
    let found=false;

    for(const group in DATA){

      const list=DATA[group];
      if(!Array.isArray(list)) continue;

      for(const item of list){

        const code=item.code || item;

        if(!code.toUpperCase().includes(q))
          continue;

        found=true;

        const chip=detectChip(code);
        const hw=buildHardware(item);

        // Dùng group thật của record, không cố định theo một mã nào.
        const g = hw.group ?? group ?? "N/A";
        const color = (g === "A10") ? "#facc15" : getColorByGroup(g);

html+=`
<div class="result-card hardware-card">

  <div class="card-header">
    <div>
      <div class="code-main">${code}</div>

      <div class="card-subline">
        <span class="card-brand-dot"></span>
        <span class="card-brand-name">${chip.name}</span>
        <span class="card-subline-sep">•</span>
        <span class="card-chip-type">Memory record</span>
      </div>
    </div>

    <div class="badge-stack">
      <div class="ram-badge" style="
        color:${color};
        border-color:${color};
      ">
        ${hw.ram && hw.rom ? hw.ram+"GB / "+hw.rom+"GB" : "N/A"}
      </div>

      <div class="vip-badge" style="
        color:${color};
        border-color:${color};
        ${g === "A9" ? "transform:translateY(8px);" : ""}
      ">
        ${g}
      </div>
    </div>
  </div>

  <div class="card-footnote">
    📱 Chưa có model đối chiếu
  </div>

</div>`;
      }
    }

    html+=`</div>`;

    if(!found){
      html=`<div style="
        margin-top:40px;
        text-align:center;
        font-size:18px;
        color:#facc15;">
        Không tìm thấy dữ liệu
      </div>`;
    }

    out.innerHTML=html;

  }catch(e){

    console.error(e);

    out.innerHTML=
      `<div style="color:#ef4444">
        Lỗi hệ thống
      </div>`;
  }
}

/* ================= LOGIN ================= */

async function secureLogin(){

  const email=document.getElementById("loginEmail").value;
  const pass=document.getElementById("loginPass").value;
  const err=document.getElementById("loginError");

  err.style.display="none";

  try{

    // ⭐ SET persistence TRƯỚC LOGIN
    await auth.setPersistence(
      firebase.auth.Auth.Persistence.SESSION
    );

    await auth.signInWithEmailAndPassword(email,pass);

  }catch{
    err.style.display="block";
  }
}


/* ================= PASSWORD TOGGLE ================= */

function togglePassword(){

  const p=document.getElementById("loginPass");

  p.type=p.type==="password"?"text":"password";
}


/* ================= AUTH STATE ================= */

auth.onAuthStateChanged(async (user) => {

  const loginScreen = document.getElementById("loginScreen");
  const adminPanel  = document.getElementById("adminPanel");
  const createBtn   = document.querySelector(".create-link-btn");

  // luôn ẩn admin trước (tránh F5 auto hiện)
  adminPanel.style.display = "none";
  createBtn?.classList.remove("show");

  /* ================= USER MODE (?u=) ================= */
  if (IS_USER_MODE) {

    // ẩn login
    loginScreen?.remove();

    // ⭐ HIỆN Ô NHẬP MÃ CHECK
    adminPanel.style.display = "block";

    // ❌ ẨN PHẦN QUẢN LÝ ADMIN
    document.getElementById("adminContent")?.remove();
    document.getElementById("adminToggle")?.remove();
    createBtn?.remove();

    return;
  }

  /* ================= CHƯA LOGIN ================= */
  if (!user) {
    loginScreen.style.display = "flex";
    return;
  }

  /* ================= CHECK ADMIN ================= */
  try {

    const snap = await db.collection("users")
      .doc(user.email)
      .get();

    // không phải admin → logout
    if (!snap.exists || snap.data().role !== "admin") {
      await auth.signOut();
      loginScreen.style.display = "flex";
      return;
    }

    /* ================= LOGIN OK ================= */

    loginScreen.style.display = "none";
    adminPanel.style.display = "block";
    createBtn?.classList.add("show");

    loadLinks();

  } catch (e) {
    console.error(e);
    await auth.signOut();
    loginScreen.style.display = "flex";
  }

});
/* ================= ENTER SEARCH ================= */

document.getElementById("q")
.addEventListener("keydown",e=>{
  if(e.key==="Enter") check();
});
/* 1️⃣ ADMIN TOGGLE */
function toggleAdmin(){
  const content = document.getElementById("adminContent");
  const btn = document.getElementById("adminToggle");
  const createBtn = document.querySelector(".create-link-btn");

  const isOpen = content.classList.contains("open");

  if(isOpen){
    content.classList.remove("open");
    btn.classList.remove("active");
    createBtn.classList.remove("show");
  }else{
    content.classList.add("open");
    btn.classList.add("active");
    createBtn.classList.add("show");
    loadLinks();
  }
}


async function createLink(){

  try{

    // random id
    const id = Math.random()
      .toString(36)
      .substring(2,8)
      .toUpperCase();

    await db.collection("shareLinks")
      .doc(id)
      .set({
        id:id,
        name:"KHÁCH CHECK",
        active:true,
        views:0,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        expiresAt:null
      });

    loadLinks();

  }catch(e){
    console.error(e);
    alert("Lỗi tạo link");
  }
}


/* 3️⃣ LOAD LINKS */
async function loadLinks(){

  const box=document.getElementById("linkList");

  const snap=await db.collection("shareLinks")
    .orderBy("createdAt","desc")
    .get();

  let html="";

  snap.forEach(doc=>{

    const d=doc.data();

    const url =
      window.location.origin +
      window.location.pathname +
      "?u="+d.id;

    html+=`
    <div class="link-card">

      <b>${d.name}</b>

      <div class="link-status ${d.active?'open':'lock'}">
        ${d.active?'🟢 Đang mở':'🔒 Đã khóa'}
      </div>

      <div>👁 Lượt truy cập: ${d.views||0}</div>

      <div class="link-actions">

        <button onclick="copyLink('${url}')">📋</button>

        <button onclick="toggleLink('${d.id}',${d.active})">
          🔒
        </button>

        <button onclick="deleteLink('${d.id}')">
          🗑
        </button>

      </div>

    </div>`;
  });

  box.innerHTML=html;
}


/* ================= USER MODE (?u=) ================= */

const params = new URLSearchParams(window.location.search);
const userID = params.get("u");
const IS_USER_MODE = !!userID;

// nếu có ?u= → chạy user mode
if(userID){
  runUserMode(userID);
}

async function runUserMode(id){

  const loginScreen = document.getElementById("loginScreen");
  const adminPanel  = document.getElementById("adminPanel");
  const out         = document.getElementById("out");

  /* 🔥 BẬT Ô SEARCH NGAY */
  adminPanel.style.display = "block";

  /* 🔥 ẨN LOGIN */
  loginScreen?.remove();

  try{

    const doc = await db.collection("shareLinks")
      .doc(id)
      .get();

    if(!doc.exists){
      out.innerHTML = "❌ Link không tồn tại";
      return;
    }

    if(!doc.data().active){
      out.innerHTML = "🔒 Link đã bị khóa";
      return;
    }

    await db.collection("shareLinks")
      .doc(id)
      .update({
        views: firebase.firestore.FieldValue.increment(1)
      });

    /* ❌ ẨN PHẦN QUẢN LÝ ADMIN */
    document.getElementById("adminContent")?.remove();
    document.getElementById("adminToggle")?.remove();
    document.querySelector(".create-link-btn")?.remove();

    out.innerHTML = "";
    document.getElementById("q")?.focus();

  }catch(e){
    console.error(e);
  }
}


/* ================= COPY LINK ================= */

function copyLink(url){
  navigator.clipboard.writeText(url);
  alert("Đã copy link");
}


/* ================= TOGGLE LINK ================= */

async function toggleLink(id,state){

  await db.collection("shareLinks")
    .doc(id)
    .update({
      active:!state
    });

  loadLinks();
}


async function deleteLink(id){

  if(!confirm("Xóa link?")) return;

  await db.collection("shareLinks")
    .doc(id)
    .delete();

  loadLinks();
}
  
  
</script>

</html>

/* ===== ADMIN TOGGLE ULTRA PRO ===== */

.admin-toggle-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  -webkit-backdrop-filter:blur(10px);
  backdrop-filter:blur(10px);
  color:#e2e8f0;
  font-weight:600;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}

/* Gradient glow nền */
.admin-toggle-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#2563eb,#3b82f6,#06b6d4);
  opacity:0;
  transition:0.4s;
  z-index:0;
}

.admin-toggle-btn span{
  position:relative;
  z-index:1;
}

/* Hover */
.admin-toggle-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(37,99,235,0.3);
}

/* Active state */
.admin-toggle-btn.active{
  color:white;
  border-color:transparent;
  box-shadow:0 15px 40px rgba(37,99,235,0.5);
}

.admin-toggle-btn.active::before{
  opacity:1;
}

/* Icon xoay */
.admin-icon{
  transition:transform 0.4s ease;
}

.admin-toggle-btn.active .admin-icon{
  transform:rotate(180deg);
}

/* Mũi tên dropdown */
.admin-arrow{
  margin-left:auto;
  transition:transform 0.4s ease;
}

.admin-toggle-btn.active .admin-arrow{
  transform:rotate(180deg);
}

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    <h1 class="login-title">TOOLVECHAI</h1>

    <!-- USER -->
    <div class="input-group">
      <span class="input-icon">👤</span>
      <input id="loginEmail" type="email" placeholder="USER">
    </div>

    <!-- PASS -->
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input id="loginPass" type="password" placeholder="PASS">
      <span class="toggle-pass" onclick="togglePassword()">👁</span>
    </div>

    <button onclick="secureLogin()">ĐĂNG NHẬP</button>
    <div id="loginError" class="login-error">Sai tài khoản!</div>
  </div>
</div>


<!-- MAIN -->
<div class="main-container">

  <h2 class="main-title">TOOLVECHAIV1</h2>

  <div class="sub-title">
    VIP • MMC • Model
  </div>

</div>


<!-- ===== ADMIN PANEL ===== -->
<div id="adminPanel" class="admin-panel">

  <div class="admin-top-bar"
  >

    <!-- BÊN TRÁI: ADMIN -->
    <button class="admin-toggle-btn" id="adminToggle" onclick="toggleAdmin()">
      <span class="admin-icon">⚙</span>
      <span class="admin-text">Admin</span>
    </button>

    <!-- Ở GIỮA: INPUT -->
    <div class="check-group clean-check admin-search-wrap">
      <input id="q"
             placeholder="Nhập mã hoặc model cần kiểm tra"
             autocomplete="off">
      <button class="check-btn" onclick="check()">🔍</button>
    </div>

    <!-- BÊN PHẢI: TẠO LINK -->
    <button class="create-link-btn small" onclick="createLink()">
      ＋ Tạo link
    </button>

  </div>

  <div id="adminContent">
    <div id="linkList"></div>
  </div>

</div>



<!-- ===== KẾT QUẢ ===== -->
<div id="out" class="result-shell"></div>

<script>

document.getElementById("adminPanel").style.display="none";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCEL7BDXvmNi2dp1VNpua7b2plpTiTOK3U",
  authDomain: "toolvechai.firebaseapp.com",
  projectId: "toolvechai"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db   = firebase.firestore();

firebase.auth.Auth.Persistence.NONE

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}


/* ================= DATABASE CACHE ================= */

let DB_CACHE=null;

async function loadDatabase(){

  if(DB_CACHE) return DB_CACHE;

  const snap = await db.collection("codes").get();

  const DATA = {};

  snap.forEach(doc => {

    const d = doc.data();

    if(!d || !d.code) return;

    const group = d.group || "UNKNOWN";

    if(!DATA[group]) DATA[group] = [];

    DATA[group].push({
      code: d.code,
      ram: d.ram ?? null,
      rom: d.rom ?? null,
      group: d.group ?? group
    });
  });

  DB_CACHE = DATA;

  console.log("✅ Database rebuilt from Firestore");

  return DATA;
}


/* ================= CHIP BRAND ================= */

function detectChip(code){

  code=(code||"").toUpperCase();

  if(/^K/.test(code))
    return {name:"Samsung"};

  if(/^H/.test(code))
    return {name:"SK hynix"};

  if(/^(MT|JZ|NW)/.test(code))
    return {name:"Micron"};

  return {name:"Unknown"};
}
function getColorByGroup(group){

  if(!group) return "#999";

  if(group.includes("A1")) return "#2b313d";
  if(group.includes("A2")) return "#3a404d";
  if(group.includes("A3")) return "#4a5160";
  if(group.includes("A4")) return "#636b78";
  if(group.includes("A5")) return "#7dd3fc";
  if(group.includes("A6")) return "#60a5fa";
  if(group.includes("A7")) return "#34d399";
  if(group.includes("A8")) return "#fbbf24";
  if(group.includes("A9")) return "#fb7185";
  if(group.includes("A10")) return "#facc15";

  return "#999";
}

/* ================= FIRESTORE ONLY ================= */

function buildHardware(data){

  if(!data){
    return {
      ram:null,
      rom:null,
      vip:null,
      storage:"Unknown"
    };
  }

  return {
    ram:data.ram ?? null,
    rom:data.rom ?? null,
    group:data.group ?? null,
    storage:data.storage ?? "Manual"
  };
}


/* ================= TÌM KIẾM ================= */

async function check(){

  const q=document.getElementById("q")
    .value.trim().toUpperCase();

  const out=document.getElementById("out");

  if(!q){
    out.innerHTML="";
    return;
  }

  out.innerHTML="🔍 Đang tìm...";

  try{

    const DATA=await loadDatabase();

    let html=`<div class="result-grid">`;
    let found=false;

    for(const group in DATA){

      const list=DATA[group];
      if(!Array.isArray(list)) continue;

      for(const item of list){

        const code=item.code || item;

        if(!code.toUpperCase().includes(q))
          continue;

        found=true;

        const chip=detectChip(code);
        const hw=buildHardware(item);

        // Dùng group thật của record, không cố định theo một mã nào.
        const g = hw.group ?? group ?? "N/A";
        const color = (g === "A10") ? "#facc15" : getColorByGroup(g);

html+=`
<div class="result-card hardware-card">

  <div class="card-header">
    <div>
      <div class="code-main">${code}</div>

      <div class="card-subline">
        <span class="card-brand-dot"></span>
        <span class="card-brand-name">${chip.name}</span>
        <span class="card-subline-sep">•</span>
        <span class="card-chip-type">Memory record</span>
      </div>
    </div>

    <div class="badge-stack">
      <div class="ram-badge" style="
        color:${color};
        border-color:${color};
      ">
        ${hw.ram && hw.rom ? hw.ram+"GB / "+hw.rom+"GB" : "N/A"}
      </div>

      <div class="vip-badge" style="
        color:${color};
        border-color:${color};
        ${g === "A9" ? "transform:translateY(8px);" : ""}
      ">
        ${g}
      </div>
    </div>
  </div>

  <div class="card-footnote">
    📱 Chưa có model đối chiếu
  </div>

</div>`;
      }
    }

    html+=`</div>`;

    if(!found){
      html=`<div style="
        margin-top:40px;
        text-align:center;
        font-size:18px;
        color:#facc15;">
        Không tìm thấy dữ liệu
      </div>`;
    }

    out.innerHTML=html;

  }catch(e){

    console.error(e);

    out.innerHTML=
      `<div style="color:#ef4444">
        Lỗi hệ thống
      </div>`;
  }
}

/* ================= LOGIN ================= */

async function secureLogin(){

  const email=document.getElementById("loginEmail").value;
  const pass=document.getElementById("loginPass").value;
  const err=document.getElementById("loginError");

  err.style.display="none";

  try{

    // ⭐ SET persistence TRƯỚC LOGIN
    await auth.setPersistence(
      firebase.auth.Auth.Persistence.SESSION
    );

    await auth.signInWithEmailAndPassword(email,pass);

  }catch{
    err.style.display="block";
  }
}


/* ================= PASSWORD TOGGLE ================= */

function togglePassword(){

  const p=document.getElementById("loginPass");

  p.type=p.type==="password"?"text":"password";
}


/* ================= AUTH STATE ================= */

auth.onAuthStateChanged(async (user) => {

  const loginScreen = document.getElementById("loginScreen");
  const adminPanel  = document.getElementById("adminPanel");
  const createBtn   = document.querySelector(".create-link-btn");

  // luôn ẩn admin trước (tránh F5 auto hiện)
  adminPanel.style.display = "none";
  createBtn?.classList.remove("show");

  /* ================= USER MODE (?u=) ================= */
  if (IS_USER_MODE) {

    // ẩn login
    loginScreen?.remove();

    // ⭐ HIỆN Ô NHẬP MÃ CHECK
    adminPanel.style.display = "block";

    // ❌ ẨN PHẦN QUẢN LÝ ADMIN
    document.getElementById("adminContent")?.remove();
    document.getElementById("adminToggle")?.remove();
    createBtn?.remove();

    return;
  }

  /* ================= CHƯA LOGIN ================= */
  if (!user) {
    loginScreen.style.display = "flex";
    return;
  }

  /* ================= CHECK ADMIN ================= */
  try {

    const snap = await db.collection("users")
      .doc(user.email)
      .get();

    // không phải admin → logout
    if (!snap.exists || snap.data().role !== "admin") {
      await auth.signOut();
      loginScreen.style.display = "flex";
      return;
    }

    /* ================= LOGIN OK ================= */

    loginScreen.style.display = "none";
    adminPanel.style.display = "block";
    createBtn?.classList.add("show");

    loadLinks();

  } catch (e) {
    console.error(e);
    await auth.signOut();
    loginScreen.style.display = "flex";
  }

});
/* ================= ENTER SEARCH ================= */

document.getElementById("q")
.addEventListener("keydown",e=>{
  if(e.key==="Enter") check();
});
/* 1️⃣ ADMIN TOGGLE */
function toggleAdmin(){
  const content = document.getElementById("adminContent");
  const btn = document.getElementById("adminToggle");
  const createBtn = document.querySelector(".create-link-btn");

  const isOpen = content.classList.contains("open");

  if(isOpen){
    content.classList.remove("open");
    btn.classList.remove("active");
    createBtn.classList.remove("show");
  }else{
    content.classList.add("open");
    btn.classList.add("active");
    createBtn.classList.add("show");
    loadLinks();
  }
}


async function createLink(){

  try{

    // random id
    const id = Math.random()
      .toString(36)
      .substring(2,8)
      .toUpperCase();

    await db.collection("shareLinks")
      .doc(id)
      .set({
        id:id,
        name:"KHÁCH CHECK",
        active:true,
        views:0,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        expiresAt:null
      });

    loadLinks();

  }catch(e){
    console.error(e);
    alert("Lỗi tạo link");
  }
}


/* 3️⃣ LOAD LINKS */
async function loadLinks(){

  const box=document.getElementById("linkList");

  const snap=await db.collection("shareLinks")
    .orderBy("createdAt","desc")
    .get();

  let html="";

  snap.forEach(doc=>{

    const d=doc.data();

    const url =
      window.location.origin +
      window.location.pathname +
      "?u="+d.id;

    html+=`
    <div class="link-card">

      <b>${d.name}</b>

      <div class="link-status ${d.active?'open':'lock'}">
        ${d.active?'🟢 Đang mở':'🔒 Đã khóa'}
      </div>

      <div>👁 Lượt truy cập: ${d.views||0}</div>

      <div class="link-actions">

        <button onclick="copyLink('${url}')">📋</button>

        <button onclick="toggleLink('${d.id}',${d.active})">
          🔒
        </button>

        <button onclick="deleteLink('${d.id}')">
          🗑
        </button>

      </div>

    </div>`;
  });

  box.innerHTML=html;
}


/* ================= USER MODE (?u=) ================= */

const params = new URLSearchParams(window.location.search);
const userID = params.get("u");
const IS_USER_MODE = !!userID;

// nếu có ?u= → chạy user mode
if(userID){
  runUserMode(userID);
}

async function runUserMode(id){

  const loginScreen = document.getElementById("loginScreen");
  const adminPanel  = document.getElementById("adminPanel");
  const out         = document.getElementById("out");

  /* 🔥 BẬT Ô SEARCH NGAY */
  adminPanel.style.display = "block";

  /* 🔥 ẨN LOGIN */
  loginScreen?.remove();

  try{

    const doc = await db.collection("shareLinks")
      .doc(id)
      .get();

    if(!doc.exists){
      out.innerHTML = "❌ Link không tồn tại";
      return;
    }

    if(!doc.data().active){
      out.innerHTML = "🔒 Link đã bị khóa";
      return;
    }

    await db.collection("shareLinks")
      .doc(id)
      .update({
        views: firebase.firestore.FieldValue.increment(1)
      });

    /* ❌ ẨN PHẦN QUẢN LÝ ADMIN */
    document.getElementById("adminContent")?.remove();
    document.getElementById("adminToggle")?.remove();
    document.querySelector(".create-link-btn")?.remove();

    out.innerHTML = "";
    document.getElementById("q")?.focus();

  }catch(e){
    console.error(e);
  }
}


/* ================= COPY LINK ================= */

function copyLink(url){
  navigator.clipboard.writeText(url);
  alert("Đã copy link");
}


/* ================= TOGGLE LINK ================= */

async function toggleLink(id,state){

  await db.collection("shareLinks")
    .doc(id)
    .update({
      active:!state
    });

  loadLinks();
}


async function deleteLink(id){

  if(!confirm("Xóa link?")) return;

  await db.collection("shareLinks")
    .doc(id)
    .delete();

  loadLinks();
}
  
  
</script>
